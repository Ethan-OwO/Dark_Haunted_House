# .github/workflows/build.yml
name: Java CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5        
      - uses: actions/setup-java@v5      
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: mvn --batch-mode compile
